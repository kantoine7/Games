<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.4rem;
      letter-spacing: 2px;
      color: #e0e0ff;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.6rem;
      color: #a0a0ff;
      transition: color 0.2s;
    }

    #status.win  { color: #7eff9a; }
    #status.draw { color: #ffd700; }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows:    repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.2rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.04);
    }

    .cell.taken { cursor: default; }
    .cell.x { color: #e94560; }
    .cell.o { color: #0f9fba; }
    .cell.win-cell { background: #1e3a5f; }

    #restart {
      margin-top: 1.8rem;
      padding: 0.6rem 2rem;
      font-size: 1rem;
      background: #533483;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    #restart:hover {
      background: #7048b0;
      transform: scale(1.05);
    }

    #score {
      display: flex;
      gap: 2.5rem;
      margin-bottom: 1.4rem;
      font-size: 1rem;
      color: #bbb;
    }

    #score span { font-weight: bold; font-size: 1.3rem; }
    .x-score { color: #e94560; }
    .o-score { color: #0f9fba; }
    .d-score { color: #ffd700; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>

  <div id="score">
    <div>X <span class="x-score" id="xWins">0</span></div>
    <div>Draws <span class="d-score" id="draws">0</span></div>
    <div>O <span class="o-score" id="oWins">0</span></div>
  </div>

  <div id="status">X's turn</div>

  <div id="board">
    <div class="cell" data-index="0"></div>
    <div class="cell" data-index="1"></div>
    <div class="cell" data-index="2"></div>
    <div class="cell" data-index="3"></div>
    <div class="cell" data-index="4"></div>
    <div class="cell" data-index="5"></div>
    <div class="cell" data-index="6"></div>
    <div class="cell" data-index="7"></div>
    <div class="cell" data-index="8"></div>
  </div>

  <button id="restart">Restart</button>

  <script>
    // Tic Tac Toe — two-player browser game, tracks score across rounds.
    // Dependencies: none

    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, gameOver;
    let score = { X: 0, O: 0, D: 0 };

    const cells   = document.querySelectorAll('.cell');
    const status  = document.getElementById('status');
    const xWinsEl = document.getElementById('xWins');
    const oWinsEl = document.getElementById('oWins');
    const drawsEl = document.getElementById('draws');

    function initGame() {
      board    = Array(9).fill(null);
      current  = 'X';
      gameOver = false;
      cells.forEach(c => {
        c.textContent = '';
        c.className   = 'cell';
      });
      setStatus(`${current}'s turn`);
    }

    function setStatus(msg, type = '') {
      status.textContent = msg;
      status.className   = type;
    }

    function checkResult() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return { winner: board[a], line: [a, b, c] };
        }
      }
      if (board.every(Boolean)) return { draw: true };
      return null;
    }

    function handleClick(e) {
      const idx = +e.currentTarget.dataset.index;
      if (gameOver || board[idx]) return;

      board[idx] = current;
      const cell = cells[idx];
      cell.textContent = current;
      cell.classList.add('taken', current.toLowerCase());

      const result = checkResult();
      if (result) {
        gameOver = true;
        if (result.winner) {
          result.line.forEach(i => cells[i].classList.add('win-cell'));
          score[result.winner]++;
          updateScore();
          setStatus(`${result.winner} wins!`, 'win');
        } else {
          score.D++;
          updateScore();
          setStatus("It's a draw!", 'draw');
        }
        return;
      }

      current = current === 'X' ? 'O' : 'X';
      setStatus(`${current}'s turn`);
    }

    function updateScore() {
      xWinsEl.textContent = score.X;
      oWinsEl.textContent = score.O;
      drawsEl.textContent = score.D;
    }

    cells.forEach(c => c.addEventListener('click', handleClick));
    document.getElementById('restart').addEventListener('click', initGame);

    initGame();
  </script>
</body>
</html>
